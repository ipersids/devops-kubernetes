apiVersion: apps/v1
kind: Deployment
metadata:
  name: todobackend-dep
  namespace: project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todobackend
  template:
    metadata:
      labels:
        app: todobackend
    spec:
      containers:
        - name: todobackend
          image: ipersids/todobackend:ex2.2
          env:
            - name: PORT
              value: "3003"
          ports:
            - name: http
              containerPort: 3003
