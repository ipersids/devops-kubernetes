apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-ingress
  namespace: project
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: todoapp-svc
                port:
                  number: 2346
          - path: /todos
            pathType: Prefix
            backend:
              service:
                name: todobackend-svc
                port:
                  number: 2348
