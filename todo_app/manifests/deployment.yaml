apiVersion: apps/v1
kind: Deployment
metadata:
  name: todoapp-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todoapp
  template:
    metadata:
      labels:
        app: todoapp
    spec:
      containers:
        - name: todoapp
          image: ipersids/todoapp:ex1.5

          env:
            - name: PORT
              value: "3000"

          ports:
            - name: http
              containerPort: 3000
